services:
  # --- BLOQUE MQTT ---
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: iot-mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto_data:/mosquitto/data
      - ./mosquitto_log:/mosquitto/log
    networks:
      - shared-network

  mqtt-explorer:
    image: smeagolworms4/mqtt-explorer
    container_name: mqtt-explorer
    ports:
      - "4000:4000"
    depends_on:
      - mqtt-broker
    networks:
      - shared-network

  sensor-simulator:
    image: python:3.9-slim
    container_name: iot-sensor-simulator
    depends_on:
      - mqtt-broker
    working_dir: /app
    volumes:
      - ./mosquitto/src/sensor_simulator.py:/app/sensor_simulator.py
      - ./mosquitto/src/requirements.txt:/app/requirements.txt
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python -u sensor_simulator.py"
    environment:
      - BROKER_HOST=mqtt-broker
      - BROKER_PORT=1883
      - TOPIC_PREFIX=iot/sensores
    networks:
      - shared-network

  data-consumer:
    image: python:3.9-slim
    container_name: iot-data-consumer
    depends_on:
      - mqtt-broker
      - influxdb2
    working_dir: /app
    volumes:
      - ./mosquitto/src/data_consumer.py:/app/data_consumer.py
      - ./mosquitto/src/requirements.txt:/app/requirements.txt
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python -u data_consumer.py"
    environment:
      - BROKER_HOST=mqtt-broker
      - BROKER_PORT=1883
    networks:
      - shared-network

  # --- BLOQUE INFLUXDB ---
  influxdb2:
    image: influxdb:2
    container_name: influxdb2
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME_FILE: /run/secrets/influxdb2-admin-username
      DOCKER_INFLUXDB_INIT_PASSWORD_FILE: /run/secrets/influxdb2-admin-password
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN_FILE: /run/secrets/influxdb2-admin-token
      DOCKER_INFLUXDB_INIT_ORG: docs
      DOCKER_INFLUXDB_INIT_BUCKET: home
    secrets:
      - influxdb2-admin-username
      - influxdb2-admin-password
      - influxdb2-admin-token
    volumes:
      - influxdb2-data:/var/lib/influxdb2
      - influxdb2-config:/etc/influxdb2
      - ./influxdb/flux-scripts:/flux-scripts:ro
    networks:
      - shared-network

networks:
  shared-network:
    external: true

secrets:
  influxdb2-admin-username:
    file: ./influxdb/.env.influxdb2-admin-username
  influxdb2-admin-password:
    file: ./influxdb/.env.influxdb2-admin-password
  influxdb2-admin-token:
    file: ./influxdb/.env.influxdb2-admin-token

volumes:
  influxdb2-data:
  influxdb2-config: